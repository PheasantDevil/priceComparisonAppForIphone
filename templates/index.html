<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPhone 16シリーズ 買取価格比較</title>
    <style>
      /* ローディングスピナーのスタイル */
      .loader {
        border: 16px solid #f3f3f3;
        border-radius: 50%;
        border-top: 16px solid #3498db;
        width: 120px;
        height: 120px;
        animation: spin 2s linear infinite;
        margin: 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      #priceTable {
        display: none;
      }

      .tables-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
      }

      .price-table {
        border-collapse: collapse;
        min-width: 400px;
      }

      .price-table caption {
        font-weight: bold;
        margin-bottom: 10px;
        font-size: 1.2em;
      }

      .price-table th,
      .price-table td {
        padding: 8px 15px;
        border: 1px solid #ddd;
        text-align: left;
      }

      .price-table th {
        background-color: #f2f2f2;
      }

      .price-table td:last-child {
        text-align: right;
      }

      .price-table td[style*='color: green'] {
        font-weight: bold;
      }

      .price-table td[style*='color: red'] {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>iPhone 16シリーズ 買取価格比較</h1>

    <!-- ローディング中の表示 -->
    <div id="loading">
      <div class="loader"></div>
      <p>Loading（読み込み中）...</p>
    </div>

    <!-- エラーメッセージ表示エリア -->
    <div id="error-message" style="display: none; color: red"></div>

    <!-- 価格テーブル -->
    <div
      id="priceTablesContainer"
      class="tables-container"
      style="display: none"
    ></div>

    <script>
      // ページが読み込まれた時に価格データを取得する
      document.addEventListener('DOMContentLoaded', function () {
        const API_ENDPOINT =
          'https://qow3wyg1nj.execute-api.ap-northeast-1.amazonaws.com/prod/get_prices';

        // ローディング表示
        document.getElementById('loading').style.display = 'block';
        document.getElementById('priceTablesContainer').style.display = 'none';

        // データを非同期で取得
        fetch(`${API_ENDPOINT}?series=iPhone 16`, {
          headers: {
            Accept: 'application/json',
          },
          mode: 'cors', // CORSを有効にする
        })
          .then(response => response.json())
          .then(data => {
            if (data.error) {
              console.error('Error:', data.error);
              document.getElementById('loading').innerHTML =
                'エラーが発生しました。詳細はコンソールを確認してください。';
            } else {
              const container = document.getElementById('priceTablesContainer');
              container.innerHTML = '';

              // データ描画ロジックは以前の内容と同じ
              data.forEach(item => {
                const table = document.createElement('table');
                table.className = 'price-table';

                const caption = table.createCaption();
                caption.textContent = item.series;

                const headerRow = table.insertRow();
                headerRow.innerHTML = `
                  <th>容量</th>
                  <th>カラー別買取価格</th>
                `;

                const row = table.insertRow();
                row.innerHTML = `
                  <td>${item.capacity}</td>
                  <td>${Object.entries(item.color_prices)
                    .map(
                      ([color, price]) =>
                        `${color}: ${new Intl.NumberFormat('ja-JP', {
                          style: 'currency',
                          currency: 'JPY',
                        }).format(price)}`
                    )
                    .join('<br>')}</td>
                `;

                container.appendChild(table);
              });

              document.getElementById('loading').style.display = 'none';
              document.getElementById('priceTablesContainer').style.display =
                'flex';
            }
          })
          .catch(error => {
            console.error('Fetch error:', error);
            document.getElementById('loading').innerHTML =
              'データの取得中にエラーが発生しました。';
          });
      });
    </script>
  </body>
</html>
